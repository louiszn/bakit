clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      tags: true

when:
  - event: push
    branch: main

steps:
  release:
    image: oven/bun:1

    environment:
      CI: "true"
      GIT_SSL_CAINFO: /etc/ssl/certs/ca-certificates.crt

      NPM_TOKEN:
        from_secret: NPM_TOKEN

      CODEBERG_TOKEN:
        from_secret: CODEBERG_TOKEN

    commands:
      - echo "[setup] Installing system dependencies"
      - apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates npm

      - echo "[setup] Installing project dependencies"
      - bun install --frozen-lockfile

      - |
        set -e

        echo "[git] Configuring commit identity"
        git config user.name "Bakit CI"
        git config user.email "git@louiszn.fyi"

        # The Woodpecker clone container may leave behind an SSL CA path
        # that does not exist inside this container.
        git config --unset-all http.sslCAInfo || true

        echo "[changesets] Checking release status"
        bunx changeset status --output /tmp/changeset-status.json

        HAS_PENDING_RELEASES="$$(bun -e '
          const status = await Bun.file(
            "/tmp/changeset-status.json"
          ).json();

          process.stdout.write(
            status.releases?.length > 0
              ? "true"
              : "false"
          );
        ')"

        if [ "$${HAS_PENDING_RELEASES}" = "true" ]; then
          echo "[changesets] Pending releases found"

          echo "[release] Creating release branch"
          git checkout -B changeset-release/main

          echo "[changesets] Running version"
          bunx changeset version
          echo "[changesets] Version completed"

          echo "[deps] Updating lockfile"
          bun install
          echo "[deps] Lockfile updated"

          echo "[git] Staging version changes"
          git add .

          if git diff --cached --quiet; then
            echo "[error] Changesets reported pending releases but version produced no changes"
            exit 1
          fi

          echo "[git] Creating version commit"
          git commit -m "chore: version packages"
          echo "[git] Version commit created"

          echo "[git] Configuring authenticated remote"
          git remote set-url origin \
            "https://$${CODEBERG_TOKEN}@codeberg.org/louiszn/bakit.git"

          echo "[git] Pushing release branch"
          git push --force origin changeset-release/main
          echo "[git] Release branch pushed"

          echo "[pr] Checking for existing release PR"

          PR_NUMBER="$$(curl -fsS \
            -H "Authorization: token $${CODEBERG_TOKEN}" \
            "https://codeberg.org/api/v1/repos/louiszn/bakit/pulls?state=open&limit=50" \
            | bun -e '
              const input = await Bun.stdin.text();
              const prs = JSON.parse(input);

              const pr = prs.find(
                (pr) =>
                  pr.head?.ref === "changeset-release/main" &&
                  pr.base?.ref === "main"
              );

              if (pr) {
                console.log(pr.number);
              }
            '
          )"

          if [ -z "$${PR_NUMBER}" ]; then
            echo "[pr] No existing release PR found"
            echo "[pr] Creating release PR"

            curl -fsS \
              -X POST \
              -H "Authorization: token $${CODEBERG_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://codeberg.org/api/v1/repos/louiszn/bakit/pulls" \
              -d '{
                "base": "main",
                "head": "changeset-release/main",
                "title": "chore: version packages",
                "body": "This PR was automatically generated by Changesets."
              }' \
              > /dev/null

            echo "[pr] Release PR created"
          else
            echo "[pr] Release PR #$${PR_NUMBER} already exists"
          fi

        else
          echo "[changesets] No pending releases found"

          echo "[publish] Configuring npm authentication"
          echo "//registry.npmjs.org/:_authToken=$${NPM_TOKEN}" > "$$HOME/.npmrc"
          chmod 600 "$$HOME/.npmrc"

          echo "[publish] Building packages"
          bun run build
          echo "[publish] Build completed"

          echo "[publish] Publishing packages"
          bunx changeset publish
          echo "[publish] Publish completed"

          echo "[git] Configuring authenticated remote"
          git remote set-url origin \
            "https://$${CODEBERG_TOKEN}@codeberg.org/louiszn/bakit.git"

          echo "[git] Pushing tags"
          git push origin --tags
          echo "[git] Tags pushed"

          echo "[release] Done"
        fi