when:
  - event: push
    branch: main

steps:
  release:
    image: oven/bun:1

    environment:
      NPM_TOKEN:
        from_secret: NPM_TOKEN
      CODEBERG_TOKEN:
        from_secret: CODEBERG_TOKEN

    commands:
      - apt-get update && apt-get install -y --no-install-recommends git curl
      - bun install --frozen-lockfile

      - |
        set -e

        git config user.name "Bakit CI"
        git config user.email "noreply@codeberg.org"

        if find .changeset -name '*.md' ! -name README.md | grep -q .; then
          echo "Pending changesets found"

          git checkout -B changeset-release/main

          bunx changeset version
          bun install

          git add .
          git commit -m "chore: version packages"

          git remote set-url origin \
            "https://oauth2:${CODEBERG_TOKEN}@codeberg.org/louiszn/bakit.git"

          git push --force origin changeset-release/main

          echo "Creating or updating release pull request"

          PR_NUMBER="$(
            curl -fsS \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              "https://codeberg.org/api/v1/repos/louiszn/bakit/pulls?state=open&head=louiszn:changeset-release/main&base=main" \
              | bun -e '
                const input = await Bun.stdin.text();
                const prs = JSON.parse(input);
                if (prs.length > 0) console.log(prs[0].number);
              '
          )"

          if [ -z "${PR_NUMBER}" ]; then
            curl -fsS \
              -X POST \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://codeberg.org/api/v1/repos/louiszn/bakit/pulls" \
              -d '{
                "base": "main",
                "head": "changeset-release/main",
                "title": "chore: version packages",
                "body": "This PR was automatically generated by Changesets."
              }'

            echo "Release pull request created"
          else
            echo "Release pull request #${PR_NUMBER} already exists"
          fi
        else
          echo "No pending changesets found"

          bun run build
          bunx changeset publish

          git remote set-url origin \
            "https://oauth2:${CODEBERG_TOKEN}@codeberg.org/louiszn/bakit.git"

          git push origin --tags
        fi
        