clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0
      tags: true

when:
  - event: push
    branch: main

steps:
  release:
    image: node:24-slim

    environment:
      CI: "true"

      BUN_INSTALL: /root/.bun
      PATH: /root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      GIT_SSL_CAINFO: /etc/ssl/certs/ca-certificates.crt

      NPM_TOKEN:
        from_secret: NPM_TOKEN

      CODEBERG_TOKEN:
        from_secret: CODEBERG_TOKEN

    commands:
      - echo "[setup] Installing system dependencies"
      - apt-get update && apt-get install -y --no-install-recommends git curl unzip ca-certificates

      - echo "[setup] Installing Bun"
      - curl -fsSL https://bun.com/install | bash

      - echo "[setup] Installing project dependencies"
      - bun install --frozen-lockfile

      - |
        set -e
        echo "[changesets] Checking release status"

        bunx changeset status --output /tmp/changeset-status.json

        HAS_PENDING="$$(bun -e '
          const status =
            await Bun.file(
              "/tmp/changeset-status.json"
            ).json();

          process.stdout.write(
            status.releases?.length > 0
              ? "true"
              : "false"
          );
        ')"

        if [ "$${HAS_PENDING}" = "true" ]; then
          echo "[release] Running version phase"
          bun scripts/version.ts
        else
          echo "[release] Running publish phase"
          bun scripts/publish.ts
        fi